# 1HandIndia Nginx rate-limit snippet for a single Ubuntu VPS.
#
# Place the limit_req_zone lines inside the nginx "http" block.
# Place the location blocks inside the 1HandIndia server block and keep the
# Node API bound to localhost/private networking, not the public internet.

limit_req_zone $binary_remote_addr zone=indihub_search:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=indihub_product_detail:10m rate=240r/m;
limit_req_zone $binary_remote_addr zone=indihub_checkout:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=indihub_auth:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=indihub_admin:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=indihub_public:10m rate=300r/m;

location = /api/products {
  limit_req zone=indihub_search burst=20 nodelay;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_pass http://127.0.0.1:4000;
}

location ^~ /api/products/ {
  limit_req zone=indihub_product_detail burst=60 nodelay;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_pass http://127.0.0.1:4000;
}

location ~ ^/api/(auth|admin/auth) {
  limit_req zone=indihub_auth burst=10 nodelay;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_pass http://127.0.0.1:4000;
}

location ~ ^/api/(checkout|cart|account/orders) {
  limit_req zone=indihub_checkout burst=20 nodelay;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_pass http://127.0.0.1:4000;
}

location ^~ /api/admin/ {
  limit_req zone=indihub_admin burst=40 nodelay;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_pass http://127.0.0.1:4000;
}

location ^~ /api/ {
  limit_req zone=indihub_public burst=80 nodelay;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_pass http://127.0.0.1:4000;
}
